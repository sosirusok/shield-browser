<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;" />
<title>새 탭</title>
<style>
  :root{ --bg:#0f1115; --txt:#cdd3de; --dim:#8b93a3; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font:14px/1.5 "Segoe UI",system-ui,sans-serif;user-select:none}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
  .logo{font-size:46px;line-height:1}
  h1{font-size:22px;margin:10px 0 2px;letter-spacing:-.3px}
  .sub{color:var(--dim);font-size:13px;margin:0 0 34px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px 18px;width:100%;max-width:620px}
  @media(max-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
  .tile{display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none}
  .badge{width:74px;height:74px;border-radius:20px;display:grid;place-items:center;
    color:#fff;font-weight:800;font-size:24px;letter-spacing:.5px;overflow:hidden;
    box-shadow:0 6px 18px #0007;transition:transform .12s, box-shadow .12s}
  .tile:hover .badge{transform:translateY(-4px);box-shadow:0 12px 26px #0009}
  .label{font-size:13px;color:var(--dim);max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tile:hover .label{color:var(--txt)}
  .empty{color:var(--dim);font-size:13px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🛡</div>
    <h1>Shield</h1>
    <p class="sub">바로가기를 누르거나 위 주소창에 링크를 붙여넣으세요 · 편집: <b>☰ 설정 → 바로가기 편집</b></p>
    <div class="grid" id="grid"></div>
  </div>
  <script>
    function deriveMark(name) {
      const t = (name || '').trim();
      if (/[A-Za-z]/.test(t)) { const m = t.replace(/[^A-Za-z0-9]/g, ''); return (m.slice(0, 2) || t.slice(0, 2)).toUpperCase(); }
      return t.replace(/\s+/g, '').slice(0, 2);
    }
    function deriveColor(name) {
      let h = 0; for (const c of (name || 'x')) h = (h * 31 + c.charCodeAt(0)) >>> 0;
      return 'hsl(' + (h % 360) + ' 55% 42%)';
    }
    function safeHref(url) {
      let u = String(url || '').trim();
      if (/^https?:\/\//i.test(u)) return u;
      if (/^[a-z][a-z0-9+.\-]*:/i.test(u)) return null;   // 비-http 스킴 거부
      if (/^[^\s/]+\.[^\s/]{2,}/.test(u)) return 'http://' + u;
      return null;
    }
    let list = [];
    try { list = JSON.parse(decodeURIComponent(location.hash.slice(1))) || []; } catch (e) { list = []; }
    const grid = document.getElementById('grid');
    if (!Array.isArray(list) || !list.length) {
      grid.innerHTML = '<p class="empty">바로가기가 없어요. ☰ 설정 → 바로가기 편집에서 추가하세요.</p>';
    } else {
      for (const s of list) {
        const href = safeHref(s && s.url);
        if (!href) continue;
        const a = document.createElement('a');
        a.className = 'tile';
        a.href = href;
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.style.background = (s.color && /^(#|hsl|rgb|linear-gradient)/i.test(s.color)) ? s.color : deriveColor(s.name);
        badge.textContent = s.mark ? String(s.mark) : deriveMark(s.name);
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = s.name || href;
        a.appendChild(badge); a.appendChild(label);
        grid.appendChild(a);
      }
    }
  </script>
</body>
</html>
